# =====================================================================
# netlify.toml
# Level UP by HxngBxBx — Tutor Dashboard
# =====================================================================

# ─── Build Settings ───────────────────────────────────────────────
[build]
  publish = "."        # ไฟล์ทั้งหมดอยู่ที่ root ไม่มี build step
  command = ""         # ไม่มี build command (pure HTML/JS/CSS)

# ─── Dev Server (netlify dev) ─────────────────────────────────────
[dev]
  command   = "python -m http.server 8000"
  port      = 8000
  publish   = "."

# ─── SPA Redirect ─────────────────────────────────────────────────
# ให้ทุก URL กลับมาที่ index.html (จำเป็นสำหรับ SPA)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Security Headers ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ─── Cache: HTML (ไม่ cache เพื่อให้ได้เวอร์ชันใหม่เสมอ) ──────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ─── Cache: JS & CSS (cache 1 ปี เพราะใช้ ?v= bust แล้ว) ─────────
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache: JSON ข้อสอบ (cache 1 ชั่วโมง อัปเดตได้บ่อย) ──────────
[[headers]]
  for = "/json/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# ─── Cache: เสียงและรูปภาพ (cache 30 วัน) ─────────────────────────
[[headers]]
  for = "/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/icon/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# ─── CORS สำหรับ JSON ข้อสอบ (เผื่อเรียกจาก domain อื่น) ──────────
[[headers]]
  for = "/json/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
